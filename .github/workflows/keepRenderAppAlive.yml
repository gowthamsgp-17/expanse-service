name: Keep Render App Alive
 
on:
  schedule:
    - cron: '*/3 * * * *'  # Runs every 3 minutes
  workflow_dispatch:  # Allows manual trigger
 
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Request
        run: curl -s -o /dev/null https://expanse-service.onrender.com/healthcheck

 
